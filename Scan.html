<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#061729">
<title>AETHER — Structure Scan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{background:#061729!important;}
body{background:#061729!important;color:#C8DEFF;font-family:'Inter',sans-serif;font-weight:300;line-height:1.6;min-height:100vh;display:flex;flex-direction:column;}
header{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 48px;height:64px;display:flex;align-items:center;justify-content:space-between;background:#040F1E!important;border-bottom:1px solid rgba(255,255,255,0.07);}
.logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;letter-spacing:0.22em;color:#C9A14A;text-decoration:none;text-transform:uppercase;}
nav{display:flex;gap:32px;align-items:center;}
nav a{font-size:11px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:#5A88B0;text-decoration:none;transition:color 0.2s;}
nav a:hover,nav a.active{color:#C9A14A;}
/* TOOLTIPS */
.tt{position:relative;display:inline;border-bottom:1px dotted rgba(201,161,74,0.7);color:inherit;cursor:help;white-space:nowrap;}
.tt-box{display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);width:240px;padding:10px 14px;background:#0B2240!important;border:1px solid rgba(201,161,74,0.35);color:#C8DEFF;font-family:'Inter',sans-serif;font-size:12px;font-weight:300;line-height:1.5;z-index:999;pointer-events:none;text-align:left;white-space:normal;}
.tt-box::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#0B2240;}
.tt-box::before{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:rgba(201,161,74,0.35);margin-top:1px;}
.tt.active .tt-box,.tt:hover .tt-box{display:block;}
.tt-label{font-size:10px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#C9A14A;display:block;margin-bottom:4px;}
@media(max-width:500px){.tt-box{left:-20px;transform:none;width:210px;}}
/* PROGRESS */
.progress-wrap{position:fixed;top:64px;left:0;right:0;height:3px;background:rgba(255,255,255,0.05);z-index:99;}
.progress-bar{height:100%;background:linear-gradient(90deg,#C9A14A,#E2C07A);transition:width 0.5s cubic-bezier(0.4,0,0.2,1);box-shadow:0 0 14px rgba(201,161,74,0.45);}
.stage-strip{position:fixed;top:67px;left:0;right:0;z-index:98;display:flex;align-items:center;justify-content:center;padding:5px 24px;background:#040F1E!important;border-bottom:1px solid rgba(255,255,255,0.04);}
.stage-strip-text{font-size:10px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:rgba(201,161,74,0.55);}
.scan-wrap{flex:1;padding:120px 0 80px;display:flex;flex-direction:column;align-items:center;background:#061729!important;}
.step-counter{font-size:11px;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:#C9A14A;margin-bottom:10px;text-align:center;}
.step-dots{display:flex;gap:8px;justify-content:center;margin-bottom:36px;}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.08);transition:all 0.3s;}
.dot.done{background:rgba(201,161,74,0.38);}
.dot.active{background:#C9A14A;width:22px;border-radius:3px;}
.step-container{width:100%;max-width:660px;padding:0 24px;animation:stepIn 0.4s ease forwards;}
@keyframes stepIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
.step-guide{margin-bottom:22px;padding:16px 20px;background:#0D2038!important;border-left:2px solid rgba(201,161,74,0.45);}
.step-guide-label{font-size:10px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:#C9A14A;margin-bottom:7px;}
.step-guide-text{font-size:13px;color:#7A9EC0;line-height:1.65;}
.step-title{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;line-height:1.2;color:#EEF6FF;margin-bottom:28px;text-align:center;}
.options-grid{display:grid;gap:10px;}
.options-grid.cols-2{grid-template-columns:1fr 1fr;}
.option-btn{padding:18px 22px;background:#0B2240!important;border:1px solid rgba(255,255,255,0.08);color:#A0C0E0;font-family:'Inter',sans-serif;font-size:14px;font-weight:400;text-align:left;cursor:pointer;transition:all 0.2s;position:relative;display:flex;flex-direction:column;gap:6px;-webkit-appearance:none;appearance:none;width:100%;}
.option-btn:hover{border-color:rgba(201,161,74,0.55);background:#112B50!important;color:#EEF6FF;}
.option-btn.selected{border-color:#C9A14A;background:rgba(201,161,74,0.12)!important;color:#EEF6FF;}
.option-btn.selected::after{content:'';position:absolute;top:0;left:0;width:2px;height:100%;background:#C9A14A;}
.option-label{font-size:15px;font-weight:500;color:inherit;}
.option-sub{font-size:12px;color:#5A88B0;font-weight:300;line-height:1.5;}
.option-btn.selected .option-sub,.option-btn:hover .option-sub{color:#8AAECE;}
.select-wrap{position:relative;}
select{width:100%;padding:16px 48px 16px 20px;background:#0B2240!important;border:1px solid rgba(255,255,255,0.08);color:#C8DEFF;font-family:'Inter',sans-serif;font-size:15px;font-weight:300;-webkit-appearance:none;appearance:none;cursor:pointer;transition:border-color 0.2s;outline:none;}
select:focus{border-color:#C9A14A;}
select option{background:#0B2240;color:#C8DEFF;}
.select-arrow{position:absolute;right:20px;top:50%;transform:translateY(-50%);color:#C9A14A;font-size:12px;pointer-events:none;}
.nav-buttons{display:flex;align-items:center;justify-content:space-between;margin-top:36px;padding-top:28px;border-top:1px solid rgba(255,255,255,0.07);}
.btn-back{padding:12px 28px;background:transparent!important;border:1px solid rgba(255,255,255,0.10);color:#5A88B0;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;-webkit-appearance:none;appearance:none;transition:all 0.2s;}
.btn-back:hover{border-color:#5A88B0;color:#C8DEFF;}
.btn-back:disabled{opacity:0.2;cursor:default;}
.btn-next{padding:14px 36px;background:#C9A14A!important;border:none;color:#061729!important;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;-webkit-appearance:none;appearance:none;transition:all 0.2s;display:flex;align-items:center;gap:10px;}
.btn-next:hover{background:#E2C07A!important;}
.btn-next:disabled{opacity:0.3;cursor:default;}
footer{padding:28px 80px;background:#030C17!important;border-top:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;}
.footer-copy{font-size:12px;color:#304F6A;letter-spacing:0.06em;}
.footer-link{font-size:12px;color:#304F6A;text-decoration:none;letter-spacing:0.06em;transition:color 0.2s;}
.footer-link:hover{color:#C9A14A;}
@media(max-width:768px){header{padding:0 24px;}nav{gap:18px;}.options-grid.cols-2{grid-template-columns:1fr;}footer{padding:24px;flex-direction:column;gap:12px;text-align:center;}}
</style>
</head>

<div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:12.5%"></div></div>
<div class="stage-strip"><span class="stage-strip-text" id="stageStripText">Location Strategy</span></div>
<div class="scan-wrap">
  <div class="step-counter" id="stepCounter">Step 1 of 8</div>
  <div class="step-dots" id="stepDots"></div>
  <div class="step-container" id="stepContainer"></div>
</div>
<footer>
  <span class="footer-copy">© 2026 AETHER. Educational guidance only — not legal advice.</span>
  <a href="legal.html" class="footer-link">Privacy &amp; Terms</a>
</footer>
<script>
const STATES=["Alabama","Alaska","Arizona","Arkansas","California","Colorado","Connecticut","Delaware","Florida","Georgia","Hawaii","Idaho","Illinois","Indiana","Iowa","Kansas","Kentucky","Louisiana","Maine","Maryland","Massachusetts","Michigan","Minnesota","Mississippi","Missouri","Montana","Nebraska","Nevada","New Hampshire","New Jersey","New Mexico","New York","North Carolina","North Dakota","Ohio","Oklahoma","Oregon","Pennsylvania","Rhode Island","South Carolina","South Dakota","Tennessee","Texas","Utah","Vermont","Virginia","Washington","West Virginia","Wisconsin","Wyoming"];

// TOOLTIP helper — used inside option descriptions
function tt(term,def){return`<span class="tt">${term}<span class="tt-box"><span class="tt-label">${term}</span>${def}</span></span>`;}

const steps=[
{
stage:“Location Strategy”,
guide:{label:“Here’s the truth about formation states”,text:`You have two real options. Option one: form in your home state. Simple, no extra fees, no ${tt('foreign entity registration','When you form in one state but do business in another, that second state often requires you to register there too — and pay their fees annually. It\'s called foreign entity registration.')} required. Option two: form in a strategy state like Wyoming or Delaware — but you\'ll likely still need to register in your home state too, meaning fees in both places. For most early-stage founders, forming at home is the smarter, simpler move.`},
title:“Where do you want to form?”,type:“options”,cols:2,key:“formationState”,
options:[
{label:“My Home State”,sub:`Simplest path. One filing, one set of fees, no dual registration. Best for most first-time founders who want to move fast and keep overhead low.`},
{label:“Wyoming”,sub:`Best for privacy. Strong ${tt('asset protection','Legal barriers that make it harder for creditors or lawsuits to reach your personal savings, home, or other assets.')} laws, no state income tax, low fees. Worth the dual-registration cost if keeping your name off public records matters.`},
{label:“Delaware”,sub:`Best for ${tt('raising capital','Getting investment money from outside sources like angel investors or venture capitalists (VCs) in exchange for equity/ownership in your company.')}. The VC and investor standard. Required if you plan to raise institutional money — most investors will ask for it.`},
{label:“Nevada”,sub:`Strong ${tt('charging order protections','A legal mechanism that limits what creditors can take from an LLC. In Nevada/Wyoming, creditors can\'t seize your membership interest — only receive distributions if the LLC chooses to make them.')} and asset shielding. Similar to Wyoming but slightly higher cost. Often used for holding structures.`},
{label:“Florida”,sub:`Good fit if Florida is your home state. No personal state income tax is a genuine advantage for residents. One filing, no dual-state complexity.`},
]
},
{
stage:“Operating State”,
guide:{label:“Formation state vs. operating state”,text:`You can form your ${tt('LLC','Limited Liability Company. A flexible business structure that separates your personal assets from business debts and lawsuits, while keeping taxes simpler than a corporation.')} in Wyoming but run your business from Texas — completely legal. However, you may need to register as a foreign entity in your home state, which means paying fees there too. Knowing this upfront saves surprises at tax time.`},
title:“What state do you actually operate in?”,type:“select”,key:“operatingState”,placeholder:“Select your home state…”
},
{
stage:“Business Model”,
guide:{label:“Why your business type matters”,text:`Different business models carry different ${tt('liability exposure','How much personal financial risk you have if your business gets sued or can\'t pay its debts. High liability exposure means your personal assets could be at risk without the right structure.')} and tax treatment. A software company selling subscriptions has different structural needs than a consultant billing hourly. This helps us tailor the recommendation to how your money actually flows.`},
title:“What’s your primary business focus?”,type:“options”,cols:2,key:“businessFocus”,
options:[
{label:“Products”,sub:`Physical goods, e-commerce, or manufacturing. Product businesses benefit from clear liability separation due to inventory, shipping, and returns exposure.`},
{label:“Services”,sub:`Consulting, freelancing, agencies, coaching. The most common starting point — and one of the simplest to structure correctly.`},
{label:“Software”,sub:`SaaS, apps, or digital products. If ${tt('VC funding','Venture Capital — professional investors who give startups large amounts of money in exchange for equity (ownership). They expect high growth and eventual exit.')} is anywhere in your future, this path typically points toward a C-Corp in Delaware.`},
{label:“Real Estate”,sub:`Rentals, flips, or development. Real estate often uses separate LLCs per property to isolate risk. Your formation state matters a lot here.`},
{label:“Other”,sub:`Mixed revenue streams, early-stage exploration, or an unlisted category. We'll still generate a strong recommendation based on your other answers.`},
]
},
{
stage:“Revenue Projection”,
guide:{label:“This shapes your tax path”,text:`Revenue projections help us determine whether ${tt('pass-through taxation','Your business income flows directly to your personal tax return and is taxed once. No separate corporate tax. This is how LLCs and S-Corps are taxed by default.')} is enough for you or whether a more optimized structure like an ${tt('S-Corp election','A tax status you apply for with the IRS that lets your LLC be taxed like an S-Corporation — potentially saving thousands in self-employment taxes once you\'re earning consistently.')} would save you real money. Be honest about where you expect to land in year one.`},
title:“What’s your expected first-year revenue?”,type:“options”,cols:2,key:“revenue”,
options:[
{label:“Under $50K”,sub:`Early stage or pre-revenue. A simple LLC keeps overhead low while giving you full legal protection. Don't over-engineer it yet.`},
{label:”$50K – $125K”,sub:`Getting traction. You're generating real income. A Single-Member LLC still works well here but start tracking everything carefully.`},
{label:”$125K – $500K”,sub:`Scaling operations. At this range, an S-Corp election often starts making sense for the ${tt('self-employment tax','A 15.3% tax on net business income that solo founders pay to cover Social Security and Medicare. An S-Corp election can significantly reduce this.')} savings alone.`},
{label:”$500K+”,sub:`Established or high growth. At this level, structure optimization is worth serious attention. Tax efficiency becomes a major strategic lever.`},
]
},
{
stage:“Ownership Structure”,
guide:{label:“Ownership changes everything”,text:`Whether you're building alone or with partners fundamentally affects your structure. A single-member LLC and a ${tt('multi-member LLC','An LLC with two or more owners. It\'s taxed as a partnership by default, meaning each owner pays taxes on their share of profits on their personal return — no corporate tax.')} are taxed completely differently. If partners are involved, your ${tt('operating agreement','The internal rulebook for your LLC. It defines who owns what percentage, how decisions are made, how profits are split, and what happens if a partner wants to leave. Critical with co-founders.')} becomes the most critical document you'll draft — more important than the filing itself.`},
title:“How many owners will the business have?”,type:“options”,cols:2,key:“owners”,
options:[
{label:“Just me”,sub:`Solo founder. Single-member structures are simpler, give you full control, and have clean pass-through taxation. No partnership complexities.`},
{label:“2 owners”,sub:`Co-founder setup. A multi-member LLC applies. Your operating agreement defining roles and equity splits is non-negotiable — document everything before launch.`},
{label:“3 – 4”,sub:`Small founding team. Same multi-member rules apply, but governance clarity becomes even more important. Write it all down before the first dollar moves.`},
{label:“5+”,sub:`Larger ownership group. More members means more complexity. Consider whether a corporate structure might be more appropriate long-term.`},
]
},
{
stage:“Strategic Priority”,
guide:{label:“What matters most right now”,text:`There's no universally correct priority — it depends on where you are. Early-stage founders often prioritize simplicity. Profitable solo founders often want to minimize ${tt('self-employment tax','A 15.3% tax on net business income that solo founders owe in addition to regular income tax. It covers Social Security and Medicare and adds up fast.')}. Founders in high-risk industries prioritize ${tt('liability protection','Legal separation between your personal finances and business debts or lawsuits. With proper protection, if your business gets sued, your personal bank account and home are off-limits.')}.`},
title:“What is your top priority at this stage?”,type:“options”,cols:1,key:“priority”,
options:[
{label:“Minimize taxes”,sub:`You want to reduce the self-employment and ${tt('pass-through tax','Income from the business that flows directly to your personal return and is taxed at your individual rate.')} burden as your income grows. Tax efficiency is the main lens right now.`},
{label:“Limit liability”,sub:`You want maximum separation between your personal assets and business risk. Protection is the priority over tax optimization.`},
{label:“Administrative simplicity”,sub:`You want minimal filings, meetings, and record-keeping requirements. Keep it lean and manageable while you're still building.`},
]
},
{
stage:“Capital Strategy”,
guide:{label:“Investors change your structure options”,text:`If you plan to raise outside capital — angels, ${tt('VCs','Venture Capitalists. Firms that invest large amounts of money into startups in exchange for equity. They typically require Delaware C-Corps and seats on your board.')}, or institutional investors — your entity choice is largely decided for you. Most institutional investors require a ${tt('C-Corporation','A standard corporation taxed separately from its owners. It\'s the required structure for VC funding and stock-based compensation. Subject to double taxation, but that rarely matters for growth-stage companies.')} in Delaware. If you're bootstrapping, you have full flexibility.`},
title:“Are outside investors part of your plan?”,type:“options”,cols:2,key:“investors”,
options:[
{label:“Bootstrapped”,sub:`Self-funded. No outside capital planned. You have full flexibility to choose the structure that's best for your tax and liability situation.`},
{label:“Yes, investors”,sub:`Angels, VCs, or institutional capital. Investors will almost always require a ${tt('Delaware C-Corporation','Delaware is the preferred state for corporations because its corporate law is the most developed and investor-friendly in the country. Most VC term sheets specify it.')}. This narrows the decision significantly.`},
]
},
{
stage:“Confidence Check”,
guide:{label:“One last check-in”,text:`This helps us calibrate how much context to include in your blueprint. Whether you're brand new to this or have done some research, AETHER gives you the same recommendation — just with the right level of explanation for where you're at. No wrong answer here.`},
title:“How confident are you about your structure choice?”,type:“options”,cols:1,key:“confidence”,
options:[
{label:“Very confident”,sub:`I know the basics and have a clear direction. I mostly need validation and help with the execution steps after formation.`},
{label:“Somewhat confident”,sub:`I've done some reading and understand the options, but want a second opinion and a clear recommendation I can trust.`},
{label:“Still figuring it out”,sub:`I'm new to this. I need education, clarity, and a framework that walks me through the decision and what comes next.`},
]
}
];

let current=0;
let answers=JSON.parse(localStorage.getItem(‘aether_answers’)||’{}’);
const savedStep=parseInt(localStorage.getItem(‘aether_step’)||‘0’);
if(savedStep>0&&savedStep<steps.length)current=savedStep;

function renderDots(){const wrap=document.getElementById(‘stepDots’);wrap.innerHTML=’’;steps.forEach((_,i)=>{const d=document.createElement(‘div’);d.className=‘dot’+(i<current?’ done’:’’)+(i===current?’ active’:’’);wrap.appendChild(d);});}

function renderStep(){
const step=steps[current];
document.getElementById(‘stepCounter’).textContent=`Step ${current+1} of ${steps.length}`;
document.getElementById(‘progressBar’).style.width=`${((current+1)/steps.length)*100}%`;
document.getElementById(‘stageStripText’).textContent=step.stage;
renderDots();
const container=document.getElementById(‘stepContainer’);
container.style.animation=‘none’;container.offsetHeight;container.style.animation=‘stepIn 0.4s ease forwards’;
let html=`<div class="step-guide"><div class="step-guide-label">${step.guide.label}</div><p class="step-guide-text">${step.guide.text}</p></div><h2 class="step-title">${step.title}</h2>`;
if(step.type===‘options’){
const grid=step.cols===2?‘cols-2’:’’;
html+=`<div class="options-grid ${grid}">`;
step.options.forEach(opt=>{
const sel=answers[step.key]===opt.label;
html+=`<button class="option-btn${sel?' selected':''}" onclick="selectOption('${step.key}','${opt.label.replace(/'/g,"\\'")}',this)"><span class="option-label">${opt.label}</span>${opt.sub?`<span class="option-sub">${opt.sub}</span>`:''}</button>`;
});
html+=`</div>`;
}else if(step.type===‘select’){
html+=`<div class="select-wrap"><select onchange="selectOption('${step.key}',this.value,null)"><option value="">— ${step.placeholder} —</option>${STATES.map(s=>`<option value=”${s}”${answers[step.key]===s?’ selected’:’’}>${s}</option>`).join('')}</select><span class="select-arrow">▾</span></div>`;
}
const isLast=current===steps.length-1;
const hasAnswer=!!answers[step.key];
html+=`<div class="nav-buttons"><button class="btn-back" onclick="prevStep()" ${current===0?'disabled':''}>← Back</button><button class="btn-next" id="nextBtn" onclick="${isLast?'finish()':'nextStep()'}" ${hasAnswer?'':'disabled'}>${isLast?'See My Results →':'Next →'}</button></div>`;
container.innerHTML=html;
// re-bind tooltip taps after render
container.querySelectorAll(’.tt’).forEach(function(el){
el.addEventListener(‘click’,function(e){e.stopPropagation();container.querySelectorAll(’.tt.active’).forEach(function(o){if(o!==el)o.classList.remove(‘active’);});el.classList.toggle(‘active’);});
});
}

function selectOption(key,value,el){
answers[key]=value;localStorage.setItem(‘aether_answers’,JSON.stringify(answers));
if(el){document.querySelectorAll(’.option-btn’).forEach(b=>b.classList.remove(‘selected’));el.classList.add(‘selected’);}
const nb=document.getElementById(‘nextBtn’);if(nb)nb.disabled=false;
}
function nextStep(){if(!answers[steps[current].key])return;current++;localStorage.setItem(‘aether_step’,current);renderStep();window.scrollTo({top:0,behavior:‘smooth’});}
function prevStep(){if(current>0){current–;localStorage.setItem(‘aether_step’,current);renderStep();window.scrollTo({top:0,behavior:‘smooth’});}}
function finish(){if(!answers[steps[current].key])return;localStorage.setItem(‘aether_step’,0);window.location.href=‘results.html’;}

renderStep();
document.addEventListener(‘click’,function(){document.querySelectorAll(’.tt.active’).forEach(function(el){el.classList.remove(‘active’);});});
</script>

</body>
</html>
