<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AETHER — Structure Scan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1A1410;
    --bg2: #211C16;
    --bg3: #2A221A;
    --gold: #C9A14A;
    --gold-light: #E2C07A;
    --gold-dim: rgba(201,161,74,0.12);
    --text: #F0EAE0;
    --text-muted: #8A7D6A;
    --text-dim: #5A5048;
    --border: rgba(201,161,74,0.18);
    --border-dim: rgba(255,255,255,0.06);
    --border-active: rgba(201,161,74,0.5);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    line-height: 1.6;
    min-height: 100vh;
  }

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 0 48px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(26,20,16,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border-dim);
  }
  .logo { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; letter-spacing: 0.22em; color: var(--gold); text-decoration: none; text-transform: uppercase; }
  nav { display: flex; gap: 40px; align-items: center; }
  nav a { font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
  nav a:hover, nav a.active { color: var(--gold); }

  /* ── PROGRESS ── */
  .progress-wrap {
    position: fixed;
    top: 64px; left: 0; right: 0;
    height: 3px;
    background: rgba(255,255,255,0.04);
    z-index: 99;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 12px rgba(201,161,74,0.4);
  }

  /* ── MAIN LAYOUT ── */
  .scan-wrap {
    min-height: 100vh;
    padding: 140px 0 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .step-counter {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
    text-align: center;
  }

  .step-container {
    width: 100%;
    max-width: 640px;
    padding: 0 24px;
    animation: stepIn 0.4s ease forwards;
  }

  @keyframes stepIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .step-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 300;
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 40px;
    text-align: center;
  }

  /* ── OPTIONS ── */
  .options-grid {
    display: grid;
    gap: 12px;
  }
  .options-grid.cols-2 { grid-template-columns: 1fr 1fr; }

  .option-btn {
    padding: 20px 24px;
    background: var(--bg2);
    border: 1px solid var(--border-dim);
    color: var(--text-muted);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 400;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .option-btn:hover {
    border-color: var(--border-active);
    color: var(--text);
    background: var(--bg3);
  }

  .option-btn.selected {
    border-color: var(--gold);
    background: var(--gold-dim);
    color: var(--text);
  }

  .option-btn.selected::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 2px;
    height: 100%;
    background: var(--gold);
  }

  .option-label {
    font-size: 15px;
    font-weight: 500;
  }

  .option-sub {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 300;
  }

  /* ── SELECT ── */
  .select-wrap { position: relative; }
  select {
    width: 100%;
    padding: 16px 48px 16px 20px;
    background: var(--bg2);
    border: 1px solid var(--border-dim);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 300;
    appearance: none;
    cursor: pointer;
    transition: border-color 0.2s;
    outline: none;
  }
  select:focus { border-color: var(--gold); }
  .select-arrow {
    position: absolute;
    right: 20px; top: 50%;
    transform: translateY(-50%);
    color: var(--gold);
    font-size: 12px;
    pointer-events: none;
  }

  /* ── NAV BUTTONS ── */
  .nav-buttons {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 48px;
    padding-top: 32px;
    border-top: 1px solid var(--border-dim);
  }

  .btn-back {
    padding: 12px 28px;
    background: transparent;
    border: 1px solid var(--border-dim);
    color: var(--text-muted);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-back:hover { border-color: var(--text-muted); color: var(--text); }
  .btn-back:disabled { opacity: 0.2; cursor: default; }

  .btn-next {
    padding: 14px 36px;
    background: var(--gold);
    border: none;
    color: var(--bg);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .btn-next:hover { background: var(--gold-light); }
  .btn-next:disabled { opacity: 0.3; cursor: default; }

  .step-dots {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 40px;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--border-dim);
    transition: all 0.3s;
  }
  .dot.done { background: rgba(201,161,74,0.4); }
  .dot.active { background: var(--gold); width: 20px; border-radius: 3px; }

  footer {
    padding: 32px 80px;
    border-top: 1px solid var(--border-dim);
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: auto;
  }
  .footer-copy { font-size: 12px; color: var(--text-dim); letter-spacing: 0.06em; }
  .footer-link { font-size: 12px; color: var(--text-dim); text-decoration: none; letter-spacing: 0.06em; transition: color 0.2s; }
  .footer-link:hover { color: var(--gold); }

  @media (max-width: 768px) {
    header { padding: 0 24px; }
    nav { gap: 20px; }
    .options-grid.cols-2 { grid-template-columns: 1fr; }
    footer { padding: 24px; flex-direction: column; gap: 12px; text-align: center; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">Aether</a>
  <nav>
    <a href="index.html">Home</a>
    <a href="scan.html" class="active">Structure Scan</a>
    <a href="results.html">Results</a>
  </nav>
</header>

<div class="progress-wrap">
  <div class="progress-bar" id="progressBar" style="width: 12.5%"></div>
</div>

<div class="scan-wrap">
  <div class="step-counter" id="stepCounter">Step 1 of 8</div>

  <div class="step-dots" id="stepDots"></div>

  <div class="step-container" id="stepContainer">
    <!-- Steps rendered by JS -->
  </div>
</div>

<footer>
  <span class="footer-copy">© 2026 AETHER. Educational guidance only — not legal advice.</span>
  <a href="legal.html" class="footer-link">Privacy &amp; Terms</a>
</footer>

<script>
const STATES_50 = ["Alabama","Alaska","Arizona","Arkansas","California","Colorado","Connecticut","Delaware","Florida","Georgia","Hawaii","Idaho","Illinois","Indiana","Iowa","Kansas","Kentucky","Louisiana","Maine","Maryland","Massachusetts","Michigan","Minnesota","Mississippi","Missouri","Montana","Nebraska","Nevada","New Hampshire","New Jersey","New Mexico","New York","North Carolina","North Dakota","Ohio","Oklahoma","Oregon","Pennsylvania","Rhode Island","South Carolina","South Dakota","Tennessee","Texas","Utah","Vermont","Virginia","Washington","West Virginia","Wisconsin","Wyoming"];

const steps = [
  {
    title: "Where do you prefer to form?",
    type: "options",
    cols: 2,
    key: "formationState",
    options: [
      { label: "Wyoming", sub: "Strong privacy protections, low fees" },
      { label: "Delaware", sub: "Preferred by investors and VCs" },
      { label: "Florida", sub: "No state income tax on individuals" },
      { label: "Nevada", sub: "Robust asset protection laws" },
    ]
  },
  {
    title: "What is your actual operating state?",
    type: "select",
    key: "operatingState",
    placeholder: "Select your home state...",
    options: STATES_50
  },
  {
    title: "Primary business focus?",
    type: "options",
    cols: 2,
    key: "businessFocus",
    options: [
      { label: "Products", sub: "Physical or manufactured goods" },
      { label: "Services", sub: "Consulting, freelance, agencies" },
      { label: "Software", sub: "SaaS, apps, digital products" },
      { label: "Real Estate", sub: "Rentals, flips, development" },
      { label: "Other", sub: "Mixed or unlisted category" },
    ]
  },
  {
    title: "Expected first-year revenue?",
    type: "options",
    cols: 2,
    key: "revenue",
    options: [
      { label: "Under $50K", sub: "Early stage / pre-revenue" },
      { label: "$50K – $125K", sub: "Getting traction" },
      { label: "$125K – $500K", sub: "Scaling operations" },
      { label: "$500K+", sub: "Established or high growth" },
    ]
  },
  {
    title: "Number of owners?",
    type: "options",
    cols: 4,
    key: "owners",
    options: [
      { label: "1" },
      { label: "2" },
      { label: "3–4" },
      { label: "5+" },
    ]
  },
  {
    title: "What is your top priority?",
    type: "options",
    cols: 1,
    key: "priority",
    options: [
      { label: "Minimize taxes", sub: "Reduce self-employment and pass-through tax burden" },
      { label: "Limit liability", sub: "Maximum separation between personal and business assets" },
      { label: "Administrative simplicity", sub: "Minimal filings, meetings, and record-keeping" },
    ]
  },
  {
    title: "Are investors involved?",
    type: "options",
    cols: 2,
    key: "investors",
    options: [
      { label: "Self-funded", sub: "Bootstrapped, no outside capital" },
      { label: "Yes, investors", sub: "Angels, VCs, or institutional capital" },
    ]
  },
  {
    title: "How confident are you about your structure?",
    type: "options",
    cols: 1,
    key: "confidence",
    options: [
      { label: "Very confident", sub: "I have a clear picture and need guidance on execution" },
      { label: "Somewhat confident", sub: "I understand the basics but want validation" },
      { label: "Still figuring it out", sub: "I need education and a starting framework" },
    ]
  },
];

let current = 0;
let answers = JSON.parse(localStorage.getItem('aether_answers') || '{}');

// Restore progress
const savedStep = parseInt(localStorage.getItem('aether_step') || '0');
if (savedStep > 0 && savedStep < steps.length) current = savedStep;

function renderDots() {
  const wrap = document.getElementById('stepDots');
  wrap.innerHTML = '';
  steps.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i < current ? ' done' : '') + (i === current ? ' active' : '');
    wrap.appendChild(d);
  });
}

function renderStep() {
  const step = steps[current];
  document.getElementById('stepCounter').textContent = `Step ${current + 1} of ${steps.length}`;
  document.getElementById('progressBar').style.width = `${((current + 1) / steps.length) * 100}%`;
  renderDots();

  const container = document.getElementById('stepContainer');
  container.style.animation = 'none';
  container.offsetHeight; // reflow
  container.style.animation = 'stepIn 0.4s ease forwards';

  let html = `<h2 class="step-title">${step.title}</h2>`;

  if (step.type === 'options') {
    const gridCols = step.cols === 4 ? 'cols-2' : step.cols === 2 ? 'cols-2' : '';
    html += `<div class="options-grid ${gridCols}" id="optionsGrid">`;
    step.options.forEach((opt, i) => {
      const isSelected = answers[step.key] === opt.label;
      html += `<button class="option-btn${isSelected ? ' selected' : ''}" data-value="${opt.label}" onclick="selectOption('${step.key}', '${opt.label}', this)">
        <span class="option-label">${opt.label}</span>
        ${opt.sub ? `<span class="option-sub">${opt.sub}</span>` : ''}
      </button>`;
    });
    html += `</div>`;
  } else if (step.type === 'select') {
    html += `<div class="select-wrap">
      <select id="stateSelect" onchange="selectOption('${step.key}', this.value, null)">
        <option value="">— ${step.placeholder} —</option>
        ${step.options.map(s => `<option value="${s}"${answers[step.key] === s ? ' selected' : ''}>${s}</option>`).join('')}
      </select>
      <span class="select-arrow">▾</span>
    </div>`;
  }

  const isLast = current === steps.length - 1;
  const hasAnswer = !!answers[step.key];

  html += `<div class="nav-buttons">
    <button class="btn-back" onclick="prevStep()" ${current === 0 ? 'disabled' : ''}>← Back</button>
    <button class="btn-next" id="nextBtn" onclick="${isLast ? 'finish()' : 'nextStep()'}" ${hasAnswer ? '' : 'disabled'}>
      ${isLast ? 'See My Results →' : 'Next →'}
    </button>
  </div>`;

  container.innerHTML = html;
}

function selectOption(key, value, el) {
  answers[key] = value;
  localStorage.setItem('aether_answers', JSON.stringify(answers));

  // Update UI
  if (el) {
    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
  }

  document.getElementById('nextBtn').disabled = false;
}

function nextStep() {
  if (!answers[steps[current].key]) return;
  current++;
  localStorage.setItem('aether_step', current);
  renderStep();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function prevStep() {
  if (current > 0) {
    current--;
    localStorage.setItem('aether_step', current);
    renderStep();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function finish() {
  if (!answers[steps[current].key]) return;
  localStorage.setItem('aether_step', 0);
  window.location.href = 'results.html';
}

renderStep();
</script>
</body>
</html>
